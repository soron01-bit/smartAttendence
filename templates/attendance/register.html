{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h1>Register New User</h1>
    <p class="subtitle">Follow the on-screen instructions to prove liveness.</p>

    <!-- UI Prompt for Liveliness -->
    <div id="livenessPrompt"
        style="background: rgba(99, 102, 241, 0.2); border: 1px solid var(--primary); padding: 1rem; text-align: center; font-weight: bold; font-size: 1.2rem; border-radius: 10px; margin-bottom: 1rem;">
        Step 1: Look directly at the camera
    </div>

    <div class="video-container" id="videoContainer">
        <video id="video" autoplay muted playsinline></video>
        <div class="loading-text" id="loadingText">
            <div class="spinner"></div>
            Loading AI Models...
        </div>
    </div>

    <div class="input-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="E.g. John Doe">
    </div>

    <div class="input-group">
        <label for="instituteCode">Institute Unique Code</label>
        <input type="text" id="instituteCode" placeholder="E.g. INST-123456">
    </div>


    <div id="dynamicFields"></div>

    <button class="btn" id="scanBtn" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 4h5v5" />
            <path d="M9.5 4h-5v5" />
            <path d="M14.5 20h5v-5" />
            <path d="M9.5 20h-5v-5" />
            <circle cx="12" cy="12" r="3" />
        </svg>
        Complete Registration
    </button>
    <div id="statusMessage" class="status-message"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const video = document.getElementById('video');
    const scanBtn = document.getElementById('scanBtn');
    const loadingText = document.getElementById('loadingText');
    const statusMessage = document.getElementById('statusMessage');
    const videoContainer = document.getElementById('videoContainer');
    const livenessPrompt = document.getElementById('livenessPrompt');

    let currentDescriptor = null;
    let livenessState = 0;
    let hasBlinked = false;
    let hasTurnedHead = false;
    let maxEAR = 0;
    let blinkFrames = 0;

    function showStatus(message, isSuccess = false) {
        statusMessage.textContent = message;
        statusMessage.className = `status-message show ${isSuccess ? 'status-success' : 'status-error'}`;
        setTimeout(() => {
            if (!isSuccess) statusMessage.classList.remove('show');
        }, 5000);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const role = urlParams.get('role');
    const dynamicFields = document.getElementById('dynamicFields');

    if (role === 'student') {
        dynamicFields.innerHTML = `
            <div class="input-group">
                <label for="gradeClass">Class / Grade</label>
                <input type="text" id="gradeClass" placeholder="E.g. Grade 10">
            </div>
            <div class="input-group">
                <label for="rollNumber">Roll Number</label>
                <input type="text" id="rollNumber" placeholder="E.g. 42">
            </div>
            <div class="input-group">
                <label for="phoneNumber">Phone Number (Optional)</label>
                <input type="text" id="phoneNumber" placeholder="E.g. +1 234 567 890">
            </div>
            <div class="input-group">
                <label for="bloodGroup">Blood Group (Optional)</label>
                <input type="text" id="bloodGroup" placeholder="E.g. O+">
            </div>
            <div class="input-group">
                <label for="guardianName">Guardian Name (Optional)</label>
                <input type="text" id="guardianName" placeholder="E.g. Jane Doe">
            </div>
        `;
    } else if (role === 'teacher') {
        dynamicFields.innerHTML = `
            <div class="input-group">
                <label for="department">Department</label>
                <input type="text" id="department" placeholder="E.g. Mathematics">
            </div>
            <div class="input-group">
                <label for="designation">Designation</label>
                <input type="text" id="designation" placeholder="E.g. Senior Professor">
            </div>
            <div class="input-group">
                <label for="phoneNumber">Phone Number (Optional)</label>
                <input type="text" id="phoneNumber" placeholder="E.g. +1 234 567 890">
            </div>
            <div class="input-group">
                <label for="bloodGroup">Blood Group (Optional)</label>
                <input type="text" id="bloodGroup" placeholder="E.g. O+">
            </div>
        `;
    } else {
        // Redir if no valid role
        window.location.href = "/";
    }

    function calculateEAR(eye) {
        // compute the euclidean distances between the two sets of vertical eye landmarks
        const d1 = Math.hypot(eye[1].x - eye[5].x, eye[1].y - eye[5].y);
        const d2 = Math.hypot(eye[2].x - eye[4].x, eye[2].y - eye[4].y);
        // compute the euclidean distance between the horizontal eye landmark (x, y)-coordinates
        const d3 = Math.hypot(eye[0].x - eye[3].x, eye[0].y - eye[3].y);
        // compute the eye aspect ratio
        return (d1 + d2) / (2.0 * d3);
    }

    async function init() {
        try {
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri('/static/models'),
                faceapi.nets.faceLandmark68Net.loadFromUri('/static/models'),
                faceapi.nets.faceRecognitionNet.loadFromUri('/static/models')
            ]);

            loadingText.style.display = 'none';

            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            video.srcObject = stream;

            video.onplay = () => {
                const canvas = faceapi.createCanvasFromMedia(video);
                videoContainer.append(canvas);
                const displaySize = { width: video.clientWidth, height: video.clientHeight };
                faceapi.matchDimensions(canvas, displaySize);

                async function processFrame() {
                    if (livenessState === 3) return; // already finished checking

                    const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();

                    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                    if (detection) {
                        const resizedDetections = faceapi.resizeResults(detection, displaySize);
                        faceapi.draw.drawDetections(canvas, resizedDetections);
                        faceapi.draw.drawFaceLandmarks(canvas, resizedDetections);

                        const landmarks = detection.landmarks;

                        // Liveliness Logic
                        if (livenessState === 0) {
                            livenessPrompt.textContent = "Please Blink slowly and Turn your head";
                            livenessPrompt.style.borderColor = "yellow";
                            livenessState = 1; // indicates tracking started
                            currentDescriptor = detection.descriptor; // Capture straight face descriptor
                            maxEAR = (calculateEAR(landmarks.getLeftEye()) + calculateEAR(landmarks.getRightEye())) / 2.0;
                            blinkFrames = 0;
                        }
                        else if (livenessState === 1) {
                            const avgEAR = (calculateEAR(landmarks.getLeftEye()) + calculateEAR(landmarks.getRightEye())) / 2.0;
                            
                            // Instantly adapt max resting state to calibrate to face distance/shape
                            if (avgEAR > maxEAR && avgEAR < 0.45) {
                                maxEAR = avgEAR;
                            }

                            // Check Blink (More robust)
                            if (!hasBlinked) {
                                if (avgEAR < 0.25 || avgEAR < maxEAR * 0.75) {
                                    blinkFrames++;
                                    if (blinkFrames >= 2) {
                                        hasBlinked = true;
                                    }
                                } else {
                                    blinkFrames = 0;
                                }
                            }

                            // Check Head Turn (More rigorous)
                            if (!hasTurnedHead) {
                                const noseTip = landmarks.getNose()[3];
                                const jaw = landmarks.getJawOutline();
                                const distLeft = noseTip.x - jaw[0].x;
                                const distRight = jaw[16].x - noseTip.x;
                                if (distLeft / distRight > 2.2 || distRight / distLeft > 2.2) hasTurnedHead = true;
                            }

                            // Dynamic prompt updates
                            if (hasBlinked && !hasTurnedHead) {
                                livenessPrompt.textContent = "Blink detected! Now Turn your head left or right.";
                                livenessPrompt.style.color = "white";
                            } else if (!hasBlinked && hasTurnedHead) {
                                livenessPrompt.textContent = "Head Turn detected! Now Blink slowly.";
                                livenessPrompt.style.color = "white";
                            }

                            // Both Verified
                            if (hasBlinked && hasTurnedHead) {
                                livenessPrompt.textContent = "Liveliness verified! Click Complete Registration";
                                livenessPrompt.style.background = "rgba(16, 185, 129, 0.2)";
                                livenessPrompt.style.borderColor = "var(--accent)";
                                livenessState = 3;
                                scanBtn.disabled = false;
                            }
                        }

                    } else {
                        livenessPrompt.textContent = "Face lost. Please look at the camera.";
                        livenessPrompt.style.borderColor = "red";
                        livenessState = 0;
                        hasBlinked = false;
                        hasTurnedHead = false;
                        maxEAR = 0;
                        blinkFrames = 0;
                        scanBtn.disabled = true;
                    }

                    // Loop continuously without hard wait
                    setTimeout(processFrame, 20);
                }

                // Start tracking loop
                processFrame();
            };

        } catch (err) {
            loadingText.innerHTML = `Error: ${err.message}`;
            console.error(err);
        }
    }

    scanBtn.addEventListener('click', async () => {
        const name = document.getElementById('name').value.trim();
        const instituteCode = document.getElementById('instituteCode').value.trim();

        let extraParams = {};
        if (role === 'student') {
            extraParams.grade_class = document.getElementById('gradeClass').value.trim();
            extraParams.roll_number = document.getElementById('rollNumber').value.trim();
            extraParams.guardian_name = document.getElementById('guardianName').value.trim();
        } else if (role === 'teacher') {
            extraParams.department = document.getElementById('department').value.trim();
            extraParams.designation = document.getElementById('designation').value.trim();
        }

        extraParams.phone_number = document.getElementById('phoneNumber').value.trim();
        extraParams.blood_group = document.getElementById('bloodGroup').value.trim();

        if (!name || !instituteCode) {
            showStatus('Please enter a name and institute code');
            return;
        }

        if (livenessState !== 3 || !currentDescriptor) {
            showStatus('Liveliness check failed. Please refresh and try again.');
            return;
        }

        scanBtn.disabled = true;
        scanBtn.innerHTML = '<div class="spinner" style="width: 20px; height: 20px;"></div> Processing...';

        try {
            const descriptorArray = Array.from(currentDescriptor);

            const response = await fetch('/api/register/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    name: name,
                    role: role,
                    descriptor: descriptorArray,
                    institute_code: instituteCode,
                    ...extraParams
                })
            });

            const data = await response.json();

            if (data.success) {
                const finalMsg = `${data.message}\nYour ID: ${data.user_id}\nYour Password: ${data.password}\n\nPlease save this password.`;
                showStatus(finalMsg, true);
                statusMessage.style.whiteSpace = "pre-line"; // Allow multiline correctly
                statusMessage.style.padding = "2rem"; // Make it bigger
                statusMessage.style.fontSize = "1.1rem";

                document.getElementById('name').value = '';
                livenessState = -1; // disable further actions
                video.srcObject.getTracks().forEach(t => t.stop()); // stop cam
            } else {
                showStatus(data.message);
                scanBtn.disabled = false;
                scanBtn.innerHTML = 'Complete Registration';
            }
        } catch (err) {
            showStatus(`Error during capture: ${err.message}`);
            scanBtn.disabled = false;
            scanBtn.innerHTML = 'Complete Registration';
        }
    });

    document.addEventListener('DOMContentLoaded', init);
</script>
{% endblock %}
