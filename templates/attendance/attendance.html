{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h1>Mark Attendance</h1>
    <p class="subtitle">Look directly at the camera for 2 seconds.</p>

    <div class="video-container" id="videoContainer">
        <video id="video" autoplay muted playsinline></video>
        <div class="loading-text" id="loadingText">
            <div class="spinner"></div>
            Loading AI & GPS...
        </div>

        <!-- Progress bar overlay -->
        <div id="progressOverlay"
            style="position: absolute; bottom: 0; left: 0; height: 10px; background: var(--accent); width: 0%; transition: width 0.1s linear;">
        </div>
    </div>

    <div id="statusMessage" class="status-message"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const video = document.getElementById('video');
    const loadingText = document.getElementById('loadingText');
    const statusMessage = document.getElementById('statusMessage');
    const videoContainer = document.getElementById('videoContainer');
    const progressOverlay = document.getElementById('progressOverlay');

    let currentLat = null;
    let currentLon = null;
    let isProcessing = false;
    let faceHoldStartTime = 0;
    const HOLD_TIME_REQUIRED = 2000; // 2 seconds

    function showStatus(message, isSuccess = false) {
        statusMessage.textContent = message;
        statusMessage.className = `status-message show ${isSuccess ? 'status-success' : 'status-error'}`;
    }

    async function init() {
        try {
            // Get Location first
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    currentLat = pos.coords.latitude;
                    currentLon = pos.coords.longitude;
                },
                (err) => {
                    showStatus('Location access denied. Cannot mark attendance.', false);
                    console.error(err);
                }
            );

            // Load models
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri('/static/models'),
                faceapi.nets.faceLandmark68Net.loadFromUri('/static/models'),
                faceapi.nets.faceRecognitionNet.loadFromUri('/static/models')
            ]);

            // Start webcam
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            video.srcObject = stream;

            video.onplay = () => {
                loadingText.style.display = 'none';

                // Overlay canvas
                const canvas = faceapi.createCanvasFromMedia(video);
                videoContainer.append(canvas);
                const displaySize = { width: video.clientWidth, height: video.clientHeight };
                faceapi.matchDimensions(canvas, displaySize);

                function calculateEAR(eye) {
                    const d1 = Math.hypot(eye[1].x - eye[5].x, eye[1].y - eye[5].y);
                    const d2 = Math.hypot(eye[2].x - eye[4].x, eye[2].y - eye[4].y);
                    const d3 = Math.hypot(eye[0].x - eye[3].x, eye[0].y - eye[3].y);
                    return (d1 + d2) / (2.0 * d3);
                }

                async function processFrame() {
                    if (isProcessing) return;

                    try {
                        const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();

                        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                        if (detection && !isProcessing) {
                            const score = detection.detection.score;
                            const boxW = detection.detection.box.width;
                            
                            const resizedDetections = faceapi.resizeResults(detection, displaySize);
                            faceapi.draw.drawDetections(canvas, resizedDetections);

                            // Anti-spoofing Quality Checks
                            if (score < 0.85 || boxW < 140) {
                                statusMessage.textContent = score < 0.85 ? "Face not clear. Avoid photos or glare." : "Face too small. Move closer.";
                                statusMessage.className = "status-message show status-error";
                                faceHoldStartTime = 0;
                                progressOverlay.style.width = '0%';
                                
                                isProcessing = true;
                                setTimeout(() => {
                                    isProcessing = false;
                                    processFrame();
                                }, 3000);
                                return;
                            }

                            faceapi.draw.drawFaceLandmarks(canvas, resizedDetections);

                            const landmarks = detection.landmarks;

                            // Anti-Spoofing: Detect Corrupted Landmarks (Phone Screen Glare / Moiré Patterns)
                            const leftEye = landmarks.getLeftEye();
                            const rightEye = landmarks.getRightEye();
                            const mouth = landmarks.getMouth();
                            
                            const isLeftEyeInverted = leftEye[1].y > leftEye[5].y || leftEye[2].y > leftEye[4].y;
                            const isRightEyeInverted = rightEye[1].y > rightEye[5].y || rightEye[2].y > rightEye[4].y;
                            const isMouthInverted = mouth[3].y > mouth[9].y;
                            const isAsymmetric = Math.abs(calculateEAR(leftEye) - calculateEAR(rightEye)) > 0.15;

                            if (isLeftEyeInverted || isRightEyeInverted || isMouthInverted || isAsymmetric) {
                                statusMessage.textContent = "Screen/Glare detected! Please use a real live face.";
                                statusMessage.className = "status-message show status-error";
                                faceHoldStartTime = 0;
                                progressOverlay.style.width = '0%';

                                isProcessing = true;
                                setTimeout(() => {
                                    isProcessing = false;
                                    processFrame();
                                }, 3000);
                                return;
                            }

                            // Normal 2-Second Hold Logic
                            statusMessage.textContent = "Hold still... looking directly at camera.";
                            statusMessage.className = "status-message show";

                            if (faceHoldStartTime === 0) {
                                faceHoldStartTime = Date.now();
                            } else {
                                const elapsed = Date.now() - faceHoldStartTime;
                                const progress = Math.min((elapsed / HOLD_TIME_REQUIRED) * 100, 100);
                                progressOverlay.style.width = progress + '%';

                                if (elapsed >= HOLD_TIME_REQUIRED) {
                                    statusMessage.textContent = "Recognizing... Please wait.";
                                    statusMessage.className = "status-message show status-success";
                                    isProcessing = true;
                                    submitAttendance(detection.descriptor);
                                    return;
                                }
                            }

                        } else if (!detection) {
                            statusMessage.textContent = "Face lost. Please look at the camera.";
                            statusMessage.className = "status-message show status-error";
                            faceHoldStartTime = 0;
                            progressOverlay.style.width = '0%';
                        }
                    } catch (err) {
                        console.error("Detection error:", err);
                    }

                    if (!isProcessing) {
                        setTimeout(processFrame, 20);
                    }
                }
                processFrame();
            };

        } catch (err) {
            loadingText.innerHTML = `Error: ${err.message}`;
            console.error(err);
        }
    }

    async function submitAttendance(descriptor) {
        if (!currentLat || !currentLon) {
            showStatus('Still fetching GPS or GPS denied. Please try again or allow location.');
            isProcessing = false;
            faceHoldStartTime = 0;
            progressOverlay.style.width = '0%';
            return;
        }

        showStatus('Processing attendance...', false);

        try {
            const response = await fetch('/api/match/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    descriptor: Array.from(descriptor),
                    lat: currentLat,
                    lon: currentLon
                })
            });

            const data = await response.json();

            if (data.success) {
                showStatus(data.message, true);
                // Keep showing success, freeze process
            } else {
                showStatus(data.message);
                // Allow trying again after a delay
                setTimeout(() => {
                    isProcessing = false;
                    faceHoldStartTime = 0;
                    progressOverlay.style.width = '0%';
                }, 3000);
            }
        } catch (err) {
            showStatus(`Error: ${err.message}`);
            setTimeout(() => {
                isProcessing = false;
                faceHoldStartTime = 0;
                progressOverlay.style.width = '0%';
            }, 3000);
        }
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
{% endblock %}
